name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.1"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx pkg-guard check
      - run: npm pack --dry-run --ignore-scripts
      - run: npm run smoke:package
      - id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - id: published
        run: |
          package="${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}"
          if npm view "$package" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$package is already published."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.published.outputs.exists == 'false'
        run: npm publish
